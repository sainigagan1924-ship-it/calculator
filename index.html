<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A clean, responsive calculator for everyday math."
    />
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" aria-labelledby="app-title">
      <section class="calculator" aria-label="Calculator">
        <div class="brand-row">
          <div>
            <p class="eyebrow">Everyday math</p>
            <h1 id="app-title">Calculator</h1>
          </div>
          <button class="theme-toggle" type="button" data-theme-toggle>
            Night
          </button>
        </div>

        <div class="display" aria-live="polite">
          <div class="history" data-history>&nbsp;</div>
          <output class="result" data-display>0</output>
        </div>

        <div class="keys">
          <button type="button" class="key utility" data-action="clear">AC</button>
          <button type="button" class="key utility" data-action="delete">DEL</button>
          <button type="button" class="key utility" data-action="percent">%</button>
          <button type="button" class="key operator" data-value="/">/</button>

          <button type="button" class="key" data-value="7">7</button>
          <button type="button" class="key" data-value="8">8</button>
          <button type="button" class="key" data-value="9">9</button>
          <button type="button" class="key operator" data-value="*">x</button>

          <button type="button" class="key" data-value="4">4</button>
          <button type="button" class="key" data-value="5">5</button>
          <button type="button" class="key" data-value="6">6</button>
          <button type="button" class="key operator" data-value="-">-</button>

          <button type="button" class="key" data-value="1">1</button>
          <button type="button" class="key" data-value="2">2</button>
          <button type="button" class="key" data-value="3">3</button>
          <button type="button" class="key operator" data-value="+">+</button>

          <button type="button" class="key wide" data-value="0">0</button>
          <button type="button" class="key" data-value=".">.</button>
          <button type="button" class="key equals" data-action="equals">=</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
